<section class="overview" data-cy="overview-tab">
  <ng-container *ngIf="loading; else contentState">
    <dpo-skeleton-kpi-grid></dpo-skeleton-kpi-grid>
  </ng-container>

  <ng-template #contentState>
    <header class="project-summary" data-cy="overview-project-summary">
      <dpo-avatar
        [avatarUrl]="project?.avatarUrl || ''"
        [initials]="projectInitials"
        size="lg"
        dataCy="overview-project-avatar"
      ></dpo-avatar>

      <div class="project-meta">
        <h3 class="project-name" data-cy="overview-project-name">{{ project?.name || 'Project Name' }}</h3>
      </div>

      <div class="project-dates" data-cy="overview-project-dates">
        <div class="date-row">
          <span class="date-label">Start Date</span>
          <span class="date-value" data-cy="overview-project-start-date">{{ formatProjectDate(project?.startDate) }}</span>
        </div>
        <div class="date-row">
          <span class="date-label">End Date</span>
          <span class="date-value" data-cy="overview-project-end-date">{{ formatProjectDate(project?.endDate) }}</span>
        </div>
      </div>
    </header>

    <div class="kpi-grid" data-cy="overview-kpi-grid">
      <dpo-kpi-card
        *ngFor="let kpi of kpis"
        [label]="kpi.label"
        [value]="kpi.value"
        [trend]="kpi.trend"
        [iconName]="kpi.iconName"
      ></dpo-kpi-card>
    </div>

    <section class="chart-panel" data-cy="overview-chart-panel">
      <ng-container *ngIf="!chartHasError; else chartErrorState">
        <dpo-budget-chart [datasets]="budgetDatasets"></dpo-budget-chart>
      </ng-container>

      <ng-template #chartErrorState>
        <section class="chart-error" data-cy="overview-chart-error">
          <div class="chart-error-skeleton" data-cy="overview-chart-error-skeleton">
            <dpo-skeleton-block width="100%" height="260px" borderRadius="var(--radius-md)"></dpo-skeleton-block>
          </div>
          <p class="chart-error-copy">Chart data is currently unavailable.</p>
        </section>
      </ng-template>
    </section>
  </ng-template>
</section>
