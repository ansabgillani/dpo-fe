<section class="monthly" data-cy="cost-monthly">
  <div class="toggles">
    <div data-cy="cost-monthly-toggle-actuals" (click)="onToggle('actuals')">
      <dpo-button
        [variant]="dataType === 'actuals' ? 'primary' : 'secondary'"
      >Actuals</dpo-button>
    </div>
    <div data-cy="cost-monthly-toggle-budget" (click)="onToggle('budget')">
      <dpo-button
        [variant]="dataType === 'budget' ? 'primary' : 'secondary'"
      >Budget</dpo-button>
    </div>
    <div data-cy="cost-monthly-toggle-actuals-fc" (click)="onToggle('actuals+fc')">
      <dpo-button
        [variant]="dataType === 'actuals+fc' ? 'primary' : 'secondary'"
      >Actuals + FC</dpo-button>
    </div>
  </div>

  <table class="table" data-cy="cost-monthly-table">
    <thead>
      <tr>
        <th>PERIOD</th>
        <th>GROSS</th>
        <th>CHARGING TO BL</th>
        <th>NET</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let row of rows" [attr.data-cy]="'cost-monthly-row-' + row.period.toLowerCase()">
        <td>{{ row.period }}</td>
        <td>{{ row.gross }}k€</td>
        <td>{{ row.chargingToBL }}k€</td>
        <td>{{ row.net }}k€</td>
      </tr>
    </tbody>
  </table>
</section>
