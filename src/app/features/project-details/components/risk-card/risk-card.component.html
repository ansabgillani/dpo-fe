<article class="risk-card" [attr.data-cy]="'risk-card-' + risk.id">
  <header class="header">
    <h4 class="title">Risk Title</h4>
    <div class="field-control" data-cy="risk-title-field">
      <dpo-input
        type="text"
        [value]="draft.title"
        [disabled]="disabled || !isEditing('title')"
        [dataCy]="'risk-title-input-' + risk.id"
        (valueChange)="onValueChange('title', $event)"
      ></dpo-input>
      <dpo-button
        *ngIf="!isEditing('title')"
        variant="icon"
        [disabled]="disabled"
        [dataCy]="'risk-title-edit-' + risk.id"
        (clicked)="onStartEdit('title')"
      >
        <dpo-icon name="pencil" [size]="14"></dpo-icon>
      </dpo-button>
      <dpo-button
        *ngIf="isEditing('title')"
        variant="primary"
        [disabled]="disabled"
        [dataCy]="'risk-title-save-' + risk.id"
        (clicked)="onSave('title')"
      >✓</dpo-button>
    </div>
  </header>

  <div class="grid">
    <div class="field">
      <label class="label">Potential Financial Loss</label>
      <div class="field-control">
        <dpo-input
          type="text"
          [value]="draft.potentialFinancialLoss"
          [disabled]="disabled || !isEditing('potentialFinancialLoss')"
          [dataCy]="'risk-pfl-input-' + risk.id"
          (valueChange)="onValueChange('potentialFinancialLoss', $event)"
        ></dpo-input>
        <dpo-button
          *ngIf="!isEditing('potentialFinancialLoss')"
          variant="icon"
          [disabled]="disabled"
          [dataCy]="'risk-pfl-edit-' + risk.id"
          (clicked)="onStartEdit('potentialFinancialLoss')"
        >
        <dpo-icon name="pencil" [size]="14"></dpo-icon>
      </dpo-button>
        <dpo-button
          *ngIf="isEditing('potentialFinancialLoss')"
          variant="primary"
          [disabled]="disabled"
          [dataCy]="'risk-pfl-save-' + risk.id"
          (clicked)="onSave('potentialFinancialLoss')"
        >✓</dpo-button>
      </div>
    </div>

    <div class="field">
      <label class="label">Risk Type</label>
      <div class="field-control">
        <dpo-select
          [options]="riskTypeOptions"
          [value]="draft.riskType"
          [disabled]="disabled || !isEditing('riskType')"
          [dataCy]="'risk-type-select-' + risk.id"

        ></dpo-select>
        <dpo-button
          *ngIf="!isEditing('riskType')"

          [dataCy]="'risk-type-edit-' + risk.id"

        <dpo-icon name="pencil" [size]="14"></dpo-icon>

        <dpo-button
          *ngIf="isEditing('riskType')"
          variant="primary"
          [disabled]="disabled"
          [dataCy]="'risk-type-save-' + risk.id"
          (clicked)="onSave('riskType')"
        >✓</dpo-button>
      </div>
    </div>

    <div class="field">
      <label class="label">Action Due Date</label>
      <div class="field-control">
        <dpo-date-picker
          [value]="draft.actionDueDate"
          [disabled]="disabled || !isEditing('actionDueDate')"
          [dataCy]="'risk-action-due-' + risk.id"
          (dateSelected)="onValueChange('actionDueDate', $event)"
        ></dpo-date-picker>
        <dpo-button
          *ngIf="!isEditing('actionDueDate')"
          variant="icon"
          [disabled]="disabled"
          [dataCy]="'risk-action-due-edit-' + risk.id"
          (clicked)="onStartEdit('actionDueDate')"
        >
        <dpo-icon name="pencil" [size]="14"></dpo-icon>

        <dpo-button
          *ngIf="isEditing('actionDueDate')"
          variant="primary"
          [disabled]="disabled"
          [dataCy]="'risk-action-due-save-' + risk.id"
          (clicked)="onSave('actionDueDate')"
        >✓</dpo-button>
      </div>
    </div>

      <label class="label">Status</label>
      <div class="field-control">
        <dpo-select
          [options]="statusOptions"
          [value]="draft.status"
          [disabled]="disabled || !isEditing('status')"

        <dpo-button

          variant="primary"
          [disabled]="disabled"
          [dataCy]="'risk-status-save-' + risk.id"
          (clicked)="onSave('status')"
        >✓</dpo-button>

</article>
